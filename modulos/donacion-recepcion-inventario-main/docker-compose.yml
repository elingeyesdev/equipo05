services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: donaciones-laravel
    volumes:
      - .:/var/www
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db       # Nombre del servicio del contenedor de postgres
      DB_PORT: 5432
      DB_DATABASE: donaciones_db
      DB_USERNAME: admin
      DB_PASSWORD: admin123
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: proyectourbanointegrador@gmail.com
      MAIL_PASSWORD: xdzjkdlgekeembwc
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: proyectourbanointegrador@gmail.com
      MAIL_FROM_NAME: "SISTEMA DE DONACIONES"
      API_BASE_URL_ADS: http://gatealas.dasalas.shop
      HELPDESK_API_URL: https://proyecto-de-ultimo-minuto.online
    depends_on:
      - db
    networks:
      - donaciones-net
  nginx:
    image: nginx:latest
    container_name: donaciones
    # expose:
    #   - "80"
    ports:
      - "8080:80" #---> despliegue local con puerto 8080
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    networks:
      - donaciones-net
      - internal-network
      - proxy-network
  db:
    image: postgres:latest
    container_name: donaciones-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: donaciones_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - donaciones-net

networks:
  donaciones-net:
    driver: bridge
  internal-network:
    external: true
  proxy-network:
    external: true

volumes:
  db-data: